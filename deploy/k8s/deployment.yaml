apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-system
  labels:
    app: fraud-detection-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-detection-system
  template:
    metadata:
      labels:
        app: fraud-detection-system
    spec:
      containers:
        - name: fraud-detection
          image: fraud-detection-system:2.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "8080"
            - name: STORAGE_BACKEND
              value: "redis"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: AUTH_REQUIRED
              value: "true"
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: fraud-detection-secrets
                  key: api-key-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fraud-detection-secrets
                  key: jwt-secret
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: fraud-detection-secrets
                  key: slack-webhook-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-system
  labels:
    app: fraud-detection-system
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: fraud-detection-system
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-detection-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-detection-system
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
