name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"
          cache: true
      - name: Download deps
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./... || go test -race ./...
      - name: Benchmarks (smoke)
        run: go test -bench=. -benchtime=1x -run=^$ ./internal/detector/
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"
          cache: true
      - name: Download deps
        run: go mod download
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"
      - name: Run govulncheck
        # govulncheck scans for known vulnerabilities in Go dependencies.
        # We run it and report findings, but don't block CI on known
        # dependency vulnerabilities that haven't been fixed upstream yet.
        # To make this blocking, remove the `|| true` below.
        # Reviewed vulnerabilities are tracked in SECURITY.md.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  build:
    name: Build Docker Image
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fraud-detection-system:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
